<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>FINTRACK AI SMART CLOUD</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#f4f6f9;margin:0;}
.container{padding:20px;}
.dashboard{display:flex;gap:15px;flex-wrap:wrap;}
.box{flex:1;min-width:150px;color:white;padding:20px;border-radius:10px;}
.saldo{background:#2c7be5;}
.masuk{background:#00a65a;}
.keluar{background:#dd4b39;}
.section{background:white;padding:20px;border-radius:10px;margin-top:20px;}
.chatBox{height:200px;overflow:auto;border:1px solid #ddd;padding:10px;}
button{padding:10px;background:#2c7be5;color:white;border:none;border-radius:6px;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
th,td{border:1px solid #ddd;padding:8px;text-align:center;}
th{background:#2c7be5;color:white;}
</style>

</head>

<body>

<div class="container">

<h2>FINTRACK AI SMART CLOUD</h2>

<!-- DASHBOARD -->
<div class="dashboard">

<div class="box saldo">
<h4>Saldo</h4>
<h2 id="saldo">Rp 0</h2>
</div>

<div class="box masuk">
<h4>Pemasukan</h4>
<h2 id="masuk">Rp 0</h2>
</div>

<div class="box keluar">
<h4>Pengeluaran</h4>
<h2 id="keluar">Rp 0</h2>
</div>

</div>

<!-- GRAFIK -->
<div class="section">
<h3>Grafik Keuangan</h3>
<canvas id="chart"></canvas>
</div>

<!-- AI ANALISIS -->
<div class="section">
<h3>Analisis AI Otomatis</h3>
<div id="aiAnalisis"></div>
</div>

<!-- INPUT -->
<div class="section">

<h3>Input Data</h3>

<input type="date" id="tanggal">
<input type="number" id="pemasukan" placeholder="Pemasukan">
<input type="number" id="pengeluaran" placeholder="Pengeluaran">

<select id="kategori">
<option>Makan</option>
<option>Transport</option>
<option>Hiburan</option>
<option>Lainnya</option>
</select>

<br><br>

<button onclick="tambahData()">Simpan</button>

</div>

<!-- RIWAYAT -->
<div class="section">

<h3>Riwayat Keuangan</h3>

<table id="tabel">
<tr>
<th>Nama</th>
<th>Tanggal</th>
<th>Pemasukan</th>
<th>Pengeluaran</th>
<th>Kategori</th>
</tr>
</table>

</div>

<!-- CHAT -->
<div class="section">

<h3>AI Konsultasi Keuangan</h3>

<div class="chatBox" id="chat"></div>

<input id="chatInput" placeholder="Tanya keuangan...">
<button onclick="chatAI()">Kirim</button>

</div>

</div>

<script>

/* API GOOGLE SHEETS */
const API_URL="ISI_URL_WEB_APP_ANDA_DISINI";

/* USER (sementara statis, bisa dikembangkan login) */
let userID="siswa1";

/* DATA */
let totalMasuk=0;
let totalKeluar=0;
let data=[];

let chart;

/* LOAD DATA DARI SHEETS */
function loadData(){

fetch(API_URL)
.then(res=>res.json())
.then(res=>{

res.forEach(d=>{

if(d.nama===userID){

totalMasuk+=parseInt(d.pemasukan);
totalKeluar+=parseInt(d.pengeluaran);

data.push({
masuk:parseInt(d.pemasukan),
keluar:parseInt(d.pengeluaran),
kategori:d.kategori
});

/* tabel */
let tabel=document.getElementById("tabel");

let row=tabel.insertRow();

row.insertCell(0).innerHTML=d.nama;
row.insertCell(1).innerHTML=d.tanggal;
row.insertCell(2).innerHTML="Rp "+parseInt(d.pemasukan).toLocaleString();
row.insertCell(3).innerHTML="Rp "+parseInt(d.pengeluaran).toLocaleString();
row.insertCell(4).innerHTML=d.kategori;

}

});

/* update semua */
updateDashboard();
updateChart();
updateAI();

});

}

/* TAMBAH DATA */
function tambahData(){

let tanggal=document.getElementById("tanggal").value;
let masuk=parseInt(document.getElementById("pemasukan").value)||0;
let keluar=parseInt(document.getElementById("pengeluaran").value)||0;
let kategori=document.getElementById("kategori").value;

if(tanggal===""){
alert("Tanggal wajib diisi");
return;
}

/* kirim ke sheets */
fetch(API_URL,{
method:"POST",
body:JSON.stringify({
nama:userID,
tanggal:tanggal,
pemasukan:masuk,
pengeluaran:keluar,
kategori:kategori
})
})
.then(res=>res.text())
.then(res=>{
alert("Data tersimpan");

/* reload data */
resetData();
loadData();

});

/* reset input */
document.getElementById("pemasukan").value="";
document.getElementById("pengeluaran").value="";

}

/* RESET DATA (AGAR TIDAK DOUBLE) */
function resetData(){

totalMasuk=0;
totalKeluar=0;
data=[];

document.getElementById("tabel").innerHTML=`
<tr>
<th>Nama</th>
<th>Tanggal</th>
<th>Pemasukan</th>
<th>Pengeluaran</th>
<th>Kategori</th>
</tr>
`;

}

/* DASHBOARD */
function updateDashboard(){

let saldo=totalMasuk-totalKeluar;

document.getElementById("saldo").innerHTML="Rp "+saldo.toLocaleString();
document.getElementById("masuk").innerHTML="Rp "+totalMasuk.toLocaleString();
document.getElementById("keluar").innerHTML="Rp "+totalKeluar.toLocaleString();

}

/* GRAFIK */
function updateChart(){

let ctx=document.getElementById("chart");

if(chart) chart.destroy();

chart=new Chart(ctx,{
type:'bar',
data:{
labels:["Pemasukan","Pengeluaran"],
datasets:[{
label:"Perbandingan",
data:[totalMasuk,totalKeluar]
}]
}
});

}

/* AI ANALISIS */
function updateAI(){

let text="";

if(totalKeluar>totalMasuk){
text+="⚠️ Boros (defisit)<br>";
}
else if(totalKeluar>totalMasuk*0.7){
text+="💡 Pengeluaran tinggi<br>";
}
else{
text+="✅ Keuangan sehat<br>";
}

let kategoriTotal={};

data.forEach(d=>{
if(!kategoriTotal[d.kategori]) kategoriTotal[d.kategori]=0;
kategoriTotal[d.kategori]+=d.keluar;
});

let maxKat="";
let maxVal=0;

for(let k in kategoriTotal){
if(kategoriTotal[k]>maxVal){
maxVal=kategoriTotal[k];
maxKat=k;
}
}

if(maxKat!=""){
text+="📊 Terbesar: "+maxKat+"<br>";
}

text+="<br>📈 Saran:<br>- Tabung 20%<br>- Kurangi "+maxKat;

document.getElementById("aiAnalisis").innerHTML=text;

}

/* CHAT AI */
function chatAI(){

let input=document.getElementById("chatInput").value.toLowerCase();
let chat=document.getElementById("chat");

chat.innerHTML+="<b>Kamu:</b> "+input+"<br>";

let saldo=totalMasuk-totalKeluar;

let respon="";

if(input.includes("saldo")){
respon="Saldo kamu Rp "+saldo.toLocaleString();
}
else if(input.includes("boros")){
respon=(totalKeluar>totalMasuk)?"Kamu boros":"Masih aman";
}
else if(input.includes("hemat")){
respon="Tips: catat semua pengeluaran.";
}
else{
respon="Tanya tentang saldo, hemat, atau boros.";
}

chat.innerHTML+="<b>AI:</b> "+respon+"<br><br>";

chat.scrollTop=chat.scrollHeight;
document.getElementById("chatInput").value="";

}

/* AUTO LOAD SAAT HALAMAN DIBUKA */
window.onload=function(){
loadData();
};

</script>

</body>
</html>
