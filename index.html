<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<title>FINTRACK - Aplikasi Keuangan Siswa</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
}

#loading{
position:fixed;
width:100%;
height:100vh;
background:#2c7be5;
color:white;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

#loginPage{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{
background:white;
padding:35px;
border-radius:15px;
width:320px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
text-align:center;
}

input,select{
width:92%;
padding:10px;
margin:6px;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:96%;
padding:10px;
background:#2c7be5;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

.container{
padding:20px;
}

.dashboard{
display:flex;
gap:15px;
flex-wrap:wrap;
margin-top:10px;
}

.box{
flex:1;
min-width:150px;
color:white;
padding:20px;
border-radius:10px;
}

.saldo{background:#2c7be5;}
.masuk{background:#00a65a;}
.keluar{background:#dd4b39;}

.section{
background:white;
padding:20px;
border-radius:10px;
margin-top:20px;
}

table{
border-collapse:collapse;
width:100%;
margin-top:10px;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

th{
background:#2c7be5;
color:white;
}

</style>

</head>

<body>

<div id="loading">
<h1>FINTRACK</h1>
<p>Memuat aplikasi...</p>
</div>

<div id="loginPage" style="display:none">

<div class="card">

<h2>Login FINTRACK</h2>

<input id="username" placeholder="Username (admin / siswa1-siswa20)">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

</div>

<div id="app" style="display:none" class="container">

<h2 id="judulUser"></h2>

<div class="dashboard">

<div class="box saldo">
<h4>Saldo</h4>
<h2 id="saldo">Rp 0</h2>
</div>

<div class="box masuk">
<h4>Total Pemasukan</h4>
<h2 id="totalMasuk">Rp 0</h2>
</div>

<div class="box keluar">
<h4>Total Pengeluaran</h4>
<h2 id="totalKeluar">Rp 0</h2>
</div>

</div>

<div class="section">

<h3>Input Keuangan</h3>

<input type="date" id="tanggal">

<input type="number" id="pemasukan" placeholder="Pemasukan">

<input type="number" id="pengeluaran" placeholder="Pengeluaran">

<select id="kategori">
<option>Makan</option>
<option>Transport</option>
<option>Pulsa</option>
<option>Hiburan</option>
<option>Lainnya</option>
</select>

<button onclick="tambahData()">Simpan</button>

</div>

<div class="section">

<h3>Riwayat Keuangan</h3>

<table id="tabel">

<tr>
<th>Nama</th>
<th>Tanggal</th>
<th>Pemasukan</th>
<th>Pengeluaran</th>
<th>Kategori</th>
</tr>

</table>

</div>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbwRgLDXjQOsnZ5Z1y1HTq6PYjT0O-FqFQUBaFBRyJ3OxIXtVlaP_bN3YDPoRf8ElUBU/exec";

let userID="";
let totalMasuk=0;
let totalKeluar=0;

setTimeout(()=>{
document.getElementById("loading").style.display="none";
document.getElementById("loginPage").style.display="flex";
},1500);

let daftarUser=["admin"];
for(let i=1;i<=20;i++){daftarUser.push("siswa"+i);}

function login(){

let username=document.getElementById("username").value.toLowerCase();
let password=document.getElementById("password").value;

if(!daftarUser.includes(username)){
alert("Username tidak terdaftar");
return;
}

if(password!="admin"){
alert("Password salah");
return;
}

userID=username;

document.getElementById("judulUser").innerHTML=
(username=="admin")?"Dashboard Admin":"Dashboard "+username;

document.getElementById("loginPage").style.display="none";
document.getElementById("app").style.display="block";

loadData();

}

function loadData(){

fetch(API_URL)
.then(res=>res.json())
.then(data=>{

let tabel=document.getElementById("tabel");

totalMasuk=0;
totalKeluar=0;

data.forEach(row=>{

let nama=row[0];
let tanggal=row[1];
let pemasukan=parseInt(row[2])||0;
let pengeluaran=parseInt(row[3])||0;
let kategori=row[4];

if(userID=="admin" || nama==userID){

let r=tabel.insertRow();

r.insertCell(0).innerHTML=nama;
r.insertCell(1).innerHTML=tanggal;
r.insertCell(2).innerHTML="Rp "+pemasukan.toLocaleString();
r.insertCell(3).innerHTML="Rp "+pengeluaran.toLocaleString();
r.insertCell(4).innerHTML=kategori;

totalMasuk+=pemasukan;
totalKeluar+=pengeluaran;

}

});

let saldo=totalMasuk-totalKeluar;

document.getElementById("totalMasuk").innerHTML="Rp "+totalMasuk.toLocaleString();
document.getElementById("totalKeluar").innerHTML="Rp "+totalKeluar.toLocaleString();
document.getElementById("saldo").innerHTML="Rp "+saldo.toLocaleString();

});

}

function tambahData(){

let tanggal=document.getElementById("tanggal").value;
let pemasukan=parseInt(document.getElementById("pemasukan").value)||0;
let pengeluaran=parseInt(document.getElementById("pengeluaran").value)||0;
let kategori=document.getElementById("kategori").value;

if(tanggal==""){
alert("Tanggal harus diisi");
return;
}

let data={
nama:userID,
tanggal:tanggal,
pemasukan:pemasukan,
pengeluaran:pengeluaran,
kategori:kategori
};

fetch(API_URL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
})
.then(res=>res.json())
.then(res=>{
if(res.status=="success"){
alert("Data berhasil disimpan");
location.reload();
}else{
alert("Gagal menyimpan data");
}
});

}

</script>

</body>
</html>
